<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal W11 Design</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #8EC5FC 0%, #E0C3FC 100%);
            --window-bg: rgba(255, 255, 255, 0.65);
            --sidebar-bg: rgba(255, 255, 255, 0.4);
            --accent-color: #0067c0;
            --border-color: rgba(255, 255, 255, 0.4);
            --text-main: #1a1a1a;
            --text-secondary: #505050;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-attachment: fixed;
            overflow: hidden;
        }

        /* Contenedor Principal (La Ventana) */
        .window {
            width: 90%;
            max-width: 1100px;
            height: 85vh;
            background: var(--window-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            display: flex;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            animation: windowFade 0.6s ease-out;
        }

        @keyframes windowFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Barra Lateral */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
            font-size: 0.95rem;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-main);
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .nav-item.active::before {
            content: "";
            position: absolute;
            left: 0;
            height: 16px;
            width: 3px;
            background: var(--accent-color);
            border-radius: 10px;
        }

        .icon {
            margin-right: 14px;
            font-size: 1.1rem;
        }

        /* Contenido */
        .content {
            flex: 1;
            padding: 48px;
            overflow-y: auto;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.4);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card:hover {
            background: white;
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card h3 {
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Scrollbar Personalizado */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <main class="window">
        <nav class="sidebar">
            <div class="nav-item active">
                <span class="icon">🏠</span>
                <span>Inicio</span>
            </div>
            <div class="nav-item">
                <span class="icon">🍞</span>
                <span>Proximanente</span>
            </div>
            <div class="nav-item">
                <span class="icon">✨</span>
                <span>Proximamente</span>
            </div>
            <div style="margin-top: auto;" class="nav-item">
                <span class="icon">🍉</span>
                <span>papaya</span>
            </div>
        </nav>

        <section class="content">
            <h1>Pruebas para la pagina</h1>
            <p class="subtitle">Mira que me encontre jeje</p>
            
            <iframe src="https://drive.google.com/file/d/1_dn5vQ5E0n8x98I3XJ0ElYs1nhkIzE8o/preview" width="100%" height="480" allowfullscreen style="border-radius: var(--radius); border: none; margin-bottom: 20px;"></iframe>
            
        </section>
    </main>

</body>
</html>
